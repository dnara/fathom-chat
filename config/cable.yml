default: &default
  adapter: redis
  url: redis://localhost:6379

development:
  <<: *default
  channel_prefix: fathom_chat_development

test:
  adapter: test

performance:
  <<: *default
  channel_prefix: fathom_chat_performance

production:
  <<: *default
  url: <%= Rails.application.credentials.dig(:redis, :url) %>
  channel_prefix: fathom_chat_production
